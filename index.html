<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Registration Form</h1>
        
        <form>
            
            <div class="form-group">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

          
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

           
            <div class="form-group">
                <label for="mobile">Mobile Number:</label>
                <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
            </div>

            
            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male"> Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="female"> Female
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="other"> Other
                    </label>
                </div>
            </div>
\
            
            <div class="form-group">
                <label for="course">Course:</label>
                <select id="course" name="course" required>
                    <option value="">Select a course</option>
                    <option value="bca">Bachelor of Computer Applications (BCA)</option>
                    <option value="btech">Bachelor of Technology (B.Tech)</option>
                    <option value="mca">Master of Computer Applications (MCA)</option>
                    <option value="mtech">Master of Technology (M.Tech)</option>
                    <option value="diploma">Diploma in IT</option>
                </select>
            </div>

            
            <div class="form-group">
                <label>Skills:</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="html"> HTML
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="css"> CSS
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="javascript"> JavaScript
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="python"> Python
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="java"> Java
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="skills" value="sql"> SQL
                    </label>
                </div>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label for="address">Address:</label>
                <textarea id="address" name="address" placeholder="Enter your full address" rows="4" required></textarea>
            </div>

            <!-- Submit Button -->
            <div class="form-group button-group">
                <button type="submit" class="btn-submit">Register</button>
                <button type="reset" class="btn-reset">Clear</button>
            </div>
        </form>
    </div>
</body>
</html>
